[package]
name = "koan-cli"
version.workspace = true
edition.workspace = true

[[bin]]
name = "koan"
path = "src/main.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.5"
crossbeam-channel = "0.5"
env_logger = "0.11"
indicatif = "0.17"
koan-core = { path = "../koan-core" }
libc = "0.2"
log = "0.4"
