name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: macos-latest
    concurrency:
      group: fmt-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    concurrency:
      group: clippy-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    concurrency:
      group: test-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --all-targets
      - run: cargo test --doc

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    concurrency:
      group: build-${{ matrix.os }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo build --release

  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Check if release needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName -q '.[0].tagName' 2>/dev/null || echo "")
          LATEST_VERSION=${LATEST_RELEASE#v}
          if [ -z "$LATEST_RELEASE" ] || [ "$CURRENT_VERSION" != "$LATEST_VERSION" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
          echo "version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

  create-release:
    name: Release (${{ matrix.binary_name }})
    runs-on: ${{ matrix.runner }}
    needs: [check-version]
    if: needs.check-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            binary_name: koan-macos-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            binary_name: koan-macos-x86_64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: koan-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            binary_name: koan-linux-arm64
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/koan koan
          tar czf "${{ matrix.binary_name }}.tar.gz" koan
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}.tar.gz

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, build, create-release, check-version]
    if: ${{ !cancelled() && !failure() && needs.check-version.outputs.should_release == 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - name: Create tag and release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.check-version.outputs.version }}" -m "Release v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"
      - uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [publish-release, check-version]
    if: ${{ !cancelled() && !failure() && needs.check-version.outputs.should_release == 'true' }}
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libdbus-1-dev
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      # Publish in dependency order: koan-core first, then the libraries that
      # depend on it, then the binary crate. `publish_crate` is idempotent —
      # if the version already exists on crates.io (e.g. from a partial
      # previous run) it logs and continues rather than failing the job.
      - name: Publish crates
        run: |
          publish_crate() {
            local crate="$1"
            if curl -sf "https://crates.io/api/v1/crates/${crate}/${VERSION}" > /dev/null; then
              echo "${crate}@${VERSION} already on crates.io, skipping"
            else
              cargo publish -p "${crate}" --no-verify
            fi
          }
          # Order matters: koan-tui depends on koan-server, not the other way
          # around. Publishing tui before server breaks with "no matching
          # package named `koan-server`" because the index hasn't seen it yet.
          publish_crate koan-core
          publish_crate koan-server
          publish_crate koan-tui
          publish_crate koan-cli

  update-homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [publish-release, check-version]
    if: ${{ !cancelled() && !failure() && needs.check-version.outputs.should_release == 'true' }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - name: Update tap formula
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "RELEASE_TOKEN not set, skipping"
            exit 0
          fi
          VERSION="${{ needs.check-version.outputs.version }}"
          ARM_SHA=$(sha256sum artifacts/koan-macos-arm64/koan-macos-arm64.tar.gz | awk '{print $1}')
          INTEL_SHA=$(sha256sum artifacts/koan-macos-x86_64/koan-macos-x86_64.tar.gz | awk '{print $1}')
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/radiosilence/homebrew-koan.git" /tmp/tap
          cd /tmp/tap
          cat > Formula/koan.rb <<FORMULA
          class Koan < Formula
            desc "Bit-perfect music player with TUI, gapless playback, and Subsonic support"
            homepage "https://github.com/radiosilence/koan"
            version "${VERSION}"
            license "MIT"
            on_arm do
              url "https://github.com/radiosilence/koan/releases/download/v#{version}/koan-macos-arm64.tar.gz"
              sha256 "${ARM_SHA}"
            end
            on_intel do
              url "https://github.com/radiosilence/koan/releases/download/v#{version}/koan-macos-x86_64.tar.gz"
              sha256 "${INTEL_SHA}"
            end
            def install
              bin.install "koan"
            end
            test do
              assert_match "koan", shell_output("#{bin}/koan --version")
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/koan.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Update koan to v${VERSION}"
          git push
